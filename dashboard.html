<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NetScope — Visual Packet Sniffer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  /* ── CSS Variables ─────────────────────────────────────────────────── */
  :root {
    --bg:          #050a0f;
    --bg2:         #080e16;
    --panel:       #0b1520;
    --panel2:      #0d1a27;
    --border:      #132233;
    --border-glow: #1a3a5c;
    --accent:      #00d4ff;
    --accent2:     #00ff9d;
    --accent3:     #ff6b35;
    --tcp:         #00d4ff;
    --udp:         #a78bfa;
    --icmp:        #fbbf24;
    --other:       #94a3b8;
    --text:        #cdd6e0;
    --text-dim:    #4a6680;
    --text-bright: #e8f4ff;
    --danger:      #ff4757;
    --glow:        0 0 20px rgba(0,212,255,0.15);
    --glow-strong: 0 0 30px rgba(0,212,255,0.35);
    --font-mono:   'IBM Plex Mono', monospace;
    --font-display:'Orbitron', monospace;
    --font-term:   'Share Tech Mono', monospace;
  }

  /* ── Reset & Base ──────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    display: flex;
    flex-direction: column;
  }

  /* ── Scanline overlay ──────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* ── Header ────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanH 4s linear infinite;
  }
  @keyframes scanH {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }
  .logo-icon svg { width: 20px; height: 20px; }
  .logo-text {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }
  .logo-sub {
    font-family: var(--font-term);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 1px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .stat-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-chip .val {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
  }
  .stat-chip .lbl {
    font-family: var(--font-term);
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .stat-chip.tcp  .val { color: var(--tcp);  }
  .stat-chip.udp  .val { color: var(--udp);  }
  .stat-chip.icmp .val { color: var(--icmp); }
  .stat-chip.total .val { color: var(--text-bright); }

  #status-badge {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--font-term);
    font-size: 10px;
    letter-spacing: 1px;
    background: var(--panel);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  #status-badge.running #status-dot {
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  #status-badge.running { border-color: var(--accent2); }

  /* ── Toolbar ────────────────────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar-sep {
    width: 1px; height: 24px;
    background: var(--border);
    margin: 0 4px;
  }
  .lbl-sm {
    font-family: var(--font-term);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  select, input[type="text"] {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    height: 28px;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,212,255,0.15);
  }
  select { cursor: pointer; min-width: 90px; }
  input[type="text"] { width: 150px; }
  input[type="text"]::placeholder { color: var(--text-dim); }

  /* Proto filter pills */
  .proto-pills { display: flex; gap: 4px; }
  .proto-pill {
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    font-family: var(--font-term);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    background: transparent;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .proto-pill:hover   { border-color: var(--text-dim); color: var(--text); }
  .proto-pill.ALL     { --c: var(--text-bright); }
  .proto-pill.TCP     { --c: var(--tcp);  }
  .proto-pill.UDP     { --c: var(--udp);  }
  .proto-pill.ICMP    { --c: var(--icmp); }
  .proto-pill.OTHER   { --c: var(--other);}
  .proto-pill.active  {
    background: color-mix(in srgb, var(--c) 12%, transparent);
    border-color: var(--c);
    color: var(--c);
    box-shadow: 0 0 8px color-mix(in srgb, var(--c) 20%, transparent);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-family: var(--font-term);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    background: var(--bg2);
    color: var(--text);
    transition: all 0.15s;
    height: 28px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: color-mix(in srgb, var(--accent2) 10%, transparent);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn.primary:hover { box-shadow: 0 0 14px rgba(0,255,157,0.25); }
  .btn.danger {
    background: color-mix(in srgb, var(--danger) 10%, transparent);
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn.danger:hover { box-shadow: 0 0 14px rgba(255,71,87,0.25); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn svg { width: 12px; height: 12px; fill: currentColor; }

  /* ── Main layout ────────────────────────────────────────────────────── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Packet Table ───────────────────────────────────────────────────── */
  .table-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .table-header {
    display: grid;
    grid-template-columns: 52px 90px 70px 130px 130px 52px 52px 60px;
    gap: 0;
    padding: 6px 0 6px 12px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-term);
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .table-header span { padding: 0 4px; }

  #packet-list {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #packet-list::-webkit-scrollbar { width: 5px; }
  #packet-list::-webkit-scrollbar-track { background: var(--bg); }
  #packet-list::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 3px; }

  .packet-row {
    display: grid;
    grid-template-columns: 52px 90px 70px 130px 130px 52px 52px 60px;
    gap: 0;
    padding: 4px 0 4px 12px;
    border-bottom: 1px solid rgba(19,34,51,0.6);
    cursor: pointer;
    transition: background 0.1s;
    animation: fadeSlide 0.2s ease-out;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .packet-row:hover    { background: var(--panel); }
  .packet-row.selected { background: color-mix(in srgb, var(--accent) 8%, transparent) !important; border-color: var(--border-glow); }
  .packet-row .cell    { padding: 0 4px; display: flex; align-items: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .packet-row .cell.id { color: var(--text-dim); font-size: 10px; }
  .packet-row .cell.ts { color: var(--text-dim); font-size: 10px; font-family: var(--font-term); }

  .proto-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-family: var(--font-term);
    font-size: 10px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .proto-badge.TCP  { background: rgba(0,212,255,0.12);  color: var(--tcp);  border: 1px solid rgba(0,212,255,0.25);  }
  .proto-badge.UDP  { background: rgba(167,139,250,0.12); color: var(--udp);  border: 1px solid rgba(167,139,250,0.25); }
  .proto-badge.ICMP { background: rgba(251,191,36,0.12);  color: var(--icmp); border: 1px solid rgba(251,191,36,0.25);  }
  .proto-badge.OTHER{ background: rgba(148,163,184,0.1);  color: var(--other);border: 1px solid rgba(148,163,184,0.2);  }

  .port-val  { color: var(--accent2); font-size: 11px; }
  .ip-val    { color: var(--text-bright); font-size: 11px; }
  .len-val   { color: var(--text-dim); font-size: 11px; }

  /* ── Detail Pane ────────────────────────────────────────────────────── */
  .detail-pane {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    overflow: hidden;
  }

  .detail-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-display);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .detail-header .detail-id {
    font-family: var(--font-term);
    color: var(--text-dim);
    font-size: 10px;
  }

  #detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  #detail-body::-webkit-scrollbar { width: 5px; }
  #detail-body::-webkit-scrollbar-thumb { background: var(--border); }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-dim);
    font-family: var(--font-term);
    font-size: 11px;
    letter-spacing: 1px;
  }
  .detail-empty svg { opacity: 0.2; }

  .detail-section { margin-bottom: 16px; }
  .detail-section-title {
    font-family: var(--font-term);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
    border-bottom: 1px dashed rgba(19,34,51,0.5);
    gap: 8px;
  }
  .detail-key {
    color: var(--text-dim);
    font-size: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .detail-val {
    color: var(--text-bright);
    font-size: 11px;
    text-align: right;
    word-break: break-all;
  }
  .detail-val.accent  { color: var(--accent); }
  .detail-val.accent2 { color: var(--accent2);}
  .detail-val.yellow  { color: var(--icmp); }

  .payload-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    font-family: var(--font-term);
    font-size: 10px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--accent2);
    max-height: 120px;
    overflow-y: auto;
  }
  .hex-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    font-family: var(--font-term);
    font-size: 10px;
    line-height: 1.8;
    word-break: break-all;
    color: var(--text-dim);
    max-height: 80px;
    overflow-y: auto;
  }
  .hex-box span { color: var(--accent); margin-right: 3px; }

  .tab-row { display: flex; gap: 0; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    padding: 4px 12px;
    font-family: var(--font-term);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Status bar ─────────────────────────────────────────────────────── */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 4px 20px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    font-family: var(--font-term);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.8px;
  }
  #sb-mode   { color: var(--accent); }
  #sb-iface  { }
  #sb-filter { color: var(--accent2); }
  #sb-msg    { margin-left: auto; }

  /* ── Auto-scroll toggle ─────────────────────────────────────────────── */
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-term); font-size: 10px;
    color: var(--text-dim); cursor: pointer; user-select: none;
  }
  .toggle-label input { display: none; }
  .toggle-track {
    width: 28px; height: 14px;
    background: var(--border);
    border-radius: 7px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    top: 2px; left: 2px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  input:checked ~ .toggle-track { background: color-mix(in srgb, var(--accent2) 30%, transparent); }
  input:checked ~ .toggle-track::after { transform: translateX(14px); background: var(--accent2); }
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 12C2 12 5 5 12 5C19 5 22 12 22 12C22 12 19 19 12 19C5 19 2 12 2 12Z" stroke="#00d4ff" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3" stroke="#00d4ff" stroke-width="1.5"/>
        <path d="M12 2V5M12 19V22M2 12H5M19 12H22" stroke="#00d4ff" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">NETSCOPE</div>
      <div class="logo-sub">PACKET ANALYSIS SYSTEM</div>
    </div>
  </div>

  <div class="header-stats">
    <div class="stat-chip total">
      <span class="val" id="stat-total">0</span>
      <span class="lbl">TOTAL</span>
    </div>
    <div class="stat-chip tcp">
      <span class="val" id="stat-tcp">0</span>
      <span class="lbl">TCP</span>
    </div>
    <div class="stat-chip udp">
      <span class="val" id="stat-udp">0</span>
      <span class="lbl">UDP</span>
    </div>
    <div class="stat-chip icmp">
      <span class="val" id="stat-icmp">0</span>
      <span class="lbl">ICMP</span>
    </div>
  </div>

  <div id="status-badge">
    <div id="status-dot"></div>
    <span id="status-text">IDLE</span>
  </div>
</header>

<!-- ── Toolbar ──────────────────────────────────────────────────────── -->
<div class="toolbar">
  <div class="toolbar-group">
    <button id="btn-start" class="btn primary" onclick="startSniff()">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      START
    </button>
    <button id="btn-stop" class="btn danger" onclick="stopSniff()" disabled>
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
      STOP
    </button>
    <button class="btn" onclick="clearPackets()">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
      CLEAR
    </button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span class="lbl-sm">IFACE</span>
    <select id="iface-select">
      <option value="any">any</option>
    </select>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span class="lbl-sm">PROTOCOL</span>
    <div class="proto-pills" id="proto-pills">
      <button class="proto-pill ALL active" onclick="setProto('ALL')">ALL</button>
      <button class="proto-pill TCP"  onclick="setProto('TCP')">TCP</button>
      <button class="proto-pill UDP"  onclick="setProto('UDP')">UDP</button>
      <button class="proto-pill ICMP" onclick="setProto('ICMP')">ICMP</button>
      <button class="proto-pill OTHER" onclick="setProto('OTHER')">OTHER</button>
    </div>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span class="lbl-sm">FILTER IP</span>
    <input type="text" id="ip-filter" placeholder="e.g. 192.168.1.1" oninput="applyFilter()"/>
  </div>

  <div class="toolbar-sep"></div>

  <label class="toggle-label">
    <input type="checkbox" id="autoscroll" checked/>
    <div class="toggle-track"></div>
    AUTO-SCROLL
  </label>
</div>

<!-- ── Workspace ────────────────────────────────────────────────────── -->
<div class="workspace">

  <!-- Table pane -->
  <div class="table-pane">
    <div class="table-header">
      <span>#</span>
      <span>TIME</span>
      <span>PROTO</span>
      <span>SRC</span>
      <span>DST</span>
      <span>SPORT</span>
      <span>DPORT</span>
      <span>LEN</span>
    </div>
    <div id="packet-list"></div>
  </div>

  <!-- Detail pane -->
  <div class="detail-pane">
    <div class="detail-header">
      <span>PACKET DETAIL</span>
      <span class="detail-id" id="detail-id">—</span>
    </div>
    <div id="detail-body">
      <div class="detail-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M2 12C2 12 5 5 12 5C19 5 22 12 22 12C22 12 19 19 12 19C5 19 2 12 2 12Z" stroke="#4a6680" stroke-width="1.5"/>
          <circle cx="12" cy="12" r="3" stroke="#4a6680" stroke-width="1.5"/>
        </svg>
        <span>SELECT A PACKET</span>
        <span style="font-size:9px;margin-top:-4px;">to inspect its contents</span>
      </div>
    </div>
  </div>
</div>

<!-- ── Status bar ───────────────────────────────────────────────────── -->
<div class="statusbar">
  <span id="sb-mode">DEMO MODE</span>
  <span>IFACE: <span id="sb-iface">—</span></span>
  <span>FILTER: <span id="sb-filter">ALL</span></span>
  <span id="sb-msg">Ready.</span>
</div>

<!-- ── Scripts ──────────────────────────────────────────────────────── -->
<script>
const API = 'http://127.0.0.1:49721';

let state = {
  running:       false,
  proto:         'ALL',
  lastId:        0,
  rows:          {},          // id → {record, el}
  selectedId:    null,
  pollInterval:  null,
  demo:          false,
};

// ── Init ────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${API}/api/interfaces`);
    const d = await r.json();
    const sel = document.getElementById('iface-select');
    sel.innerHTML = '';
    d.interfaces.forEach(iface => {
      const opt = document.createElement('option');
      opt.value = iface; opt.textContent = iface;
      sel.appendChild(opt);
    });
    state.demo = d.demo;
    document.getElementById('sb-mode').textContent =
      d.demo ? 'DEMO MODE (install Scapy for live capture)' : 'LIVE MODE';
    setMsg('Backend connected. Press START to begin.');
  } catch(e) {
    setMsg('⚠ Cannot reach backend (http://127.0.0.1:5000). Is sniffer_backend.py running?');
    document.getElementById('sb-mode').textContent = 'OFFLINE';
  }
}

// ── Controls ────────────────────────────────────────────────────────
async function startSniff() {
  const iface = document.getElementById('iface-select').value;
  const proto = state.proto === 'OTHER' ? 'ALL' : state.proto;
  try {
    const r = await fetch(`${API}/api/start`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ interface: iface, protocol: proto })
    });
    const d = await r.json();
    if (d.status === 'already_running') { setMsg('Already running.'); return; }
    state.running = true;
    state.lastId  = 0;
    updateBadge(true);
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled  = false;
    document.getElementById('sb-iface').textContent = iface;
    setMsg(d.demo ? 'Capturing (demo mode)...' : 'Live capture started.');
    state.pollInterval = setInterval(poll, 250);
  } catch(e) { setMsg('⚠ Failed to start — is the backend running?'); }
}

async function stopSniff() {
  clearInterval(state.pollInterval);
  try { await fetch(`${API}/api/stop`, { method: 'POST' }); } catch(_){}
  state.running = false;
  updateBadge(false);
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  setMsg('Capture stopped.');
}

async function clearPackets() {
  try { await fetch(`${API}/api/clear`, { method: 'POST' }); } catch(_){}
  document.getElementById('packet-list').innerHTML = '';
  state.rows = {};
  state.lastId = 0;
  state.selectedId = null;
  showEmptyDetail();
  updateStats({total:0,tcp:0,udp:0,icmp:0,other:0});
  setMsg('Cleared.');
}

// ── Protocol filter ─────────────────────────────────────────────────
function setProto(p) {
  state.proto = p;
  document.querySelectorAll('.proto-pill').forEach(el => {
    el.classList.toggle('active', el.classList.contains(p));
  });
  document.getElementById('sb-filter').textContent = p;
  // Rerender visible rows based on filter
  applyFilter();
}

function applyFilter() {
  const ipF = document.getElementById('ip-filter').value.trim();
  const prF = state.proto;
  Object.values(state.rows).forEach(({ record, el }) => {
    const protoMatch = prF === 'ALL' || record.protocol === prF;
    const ipMatch    = !ipF ||
      (record.src_ip || '').includes(ipF) ||
      (record.dst_ip || '').includes(ipF);
    el.style.display = (protoMatch && ipMatch) ? '' : 'none';
  });
}

// ── Polling ─────────────────────────────────────────────────────────
async function poll() {
  const ipF  = document.getElementById('ip-filter').value.trim();
  const url  = `${API}/api/packets?since=${state.lastId}` +
               (ipF ? `&ip=${encodeURIComponent(ipF)}` : '');
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (d.stats)   updateStats(d.stats);
    if (d.packets) {
      d.packets.forEach(addRow);
      if (d.packets.length && document.getElementById('autoscroll').checked) {
        const list = document.getElementById('packet-list');
        list.scrollTop = list.scrollHeight;
      }
    }
    if (!d.running && state.running) stopSniff();
  } catch(_) {}
}

// ── Rows ─────────────────────────────────────────────────────────────
function addRow(p) {
  if (p.id > state.lastId) state.lastId = p.id;
  if (state.rows[p.id]) return;

  const el = document.createElement('div');
  el.className  = 'packet-row';
  el.dataset.id = p.id;

  const srcPort = p.src_port != null ? `<span class="port-val">${p.src_port}</span>` : '<span class="text-dim">—</span>';
  const dstPort = p.dst_port != null ? `<span class="port-val">${p.dst_port}</span>` : '<span class="text-dim">—</span>';

  el.innerHTML = `
    <div class="cell id">${p.id}</div>
    <div class="cell ts">${p.timestamp}</div>
    <div class="cell"><span class="proto-badge ${p.protocol}">${p.protocol}</span></div>
    <div class="cell"><span class="ip-val">${p.src_ip || '—'}</span></div>
    <div class="cell"><span class="ip-val">${p.dst_ip || '—'}</span></div>
    <div class="cell">${srcPort}</div>
    <div class="cell">${dstPort}</div>
    <div class="cell len-val">${p.length}</div>
  `;
  el.addEventListener('click', () => selectPacket(p.id));

  // Apply current filter visibility
  const prF  = state.proto;
  const ipF  = document.getElementById('ip-filter').value.trim();
  const show = (prF === 'ALL' || p.protocol === prF) &&
               (!ipF || (p.src_ip||'').includes(ipF) || (p.dst_ip||'').includes(ipF));
  if (!show) el.style.display = 'none';

  document.getElementById('packet-list').appendChild(el);
  state.rows[p.id] = { record: p, el };
}

// ── Selection & Detail ────────────────────────────────────────────────
function selectPacket(id) {
  // Deselect old
  if (state.selectedId !== null && state.rows[state.selectedId]) {
    state.rows[state.selectedId].el.classList.remove('selected');
  }
  state.selectedId = id;
  const { record, el } = state.rows[id];
  el.classList.add('selected');
  document.getElementById('detail-id').textContent = `#${id}`;
  renderDetail(record);
}

function renderDetail(p) {
  const body = document.getElementById('detail-body');

  let html = '';

  // Network layer
  html += section('NETWORK LAYER', [
    ['Source IP',      p.src_ip   || '—',        'accent'],
    ['Destination IP', p.dst_ip   || '—',        'accent'],
    ['TTL',            p.ttl      != null ? p.ttl : '—', ''],
    ['Length',         `${p.length} bytes`,       ''],
    ['Protocol',       `<span class="proto-badge ${p.protocol}">${p.protocol}</span>`, ''],
  ]);

  // Transport layer
  if (p.protocol === 'TCP' || p.protocol === 'UDP') {
    const rows = [
      ['Source Port',      p.src_port || '—', 'accent2'],
      ['Destination Port', p.dst_port || '—', 'accent2'],
    ];
    if (p.protocol === 'TCP' && p.flags) {
      rows.push(['TCP Flags', renderFlags(p.flags), '']);
    }
    html += section('TRANSPORT LAYER', rows);
  }

  if (p.protocol === 'ICMP') {
    html += section('ICMP', [['Type', 'Echo/Reply', 'yellow']]);
  }

  // Meta
  html += section('METADATA', [
    ['Timestamp', p.timestamp, ''],
    ['Summary',   escapeHtml(p.raw_summary), ''],
  ]);

  // Payload
  if (p.payload) {
    html += `
    <div class="detail-section">
      <div class="detail-section-title">PAYLOAD</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab(this,'ascii-tab-${p.id}')">ASCII</button>
        <button class="tab-btn"        onclick="switchTab(this,'hex-tab-${p.id}')">HEX</button>
      </div>
      <div id="ascii-tab-${p.id}" class="payload-box">${escapeHtml(p.payload.printable)}</div>
      <div id="hex-tab-${p.id}"   class="hex-box"    style="display:none">${formatHex(p.payload.hex)}</div>
    </div>`;
  } else {
    html += `<div class="detail-section"><div class="detail-section-title">PAYLOAD</div><div style="color:var(--text-dim);font-size:10px;font-family:var(--font-term)">No payload data</div></div>`;
  }

  body.innerHTML = html;
}

function section(title, rows) {
  return `<div class="detail-section">
    <div class="detail-section-title">${title}</div>
    ${rows.map(([k, v, cls]) =>
      `<div class="detail-row">
        <span class="detail-key">${k}</span>
        <span class="detail-val ${cls}">${v}</span>
      </div>`
    ).join('')}
  </div>`;
}

function renderFlags(f) {
  const map = {S:'SYN',A:'ACK',F:'FIN',R:'RST',P:'PSH',U:'URG'};
  return [...f].map(c => map[c]
    ? `<span style="color:var(--accent);margin-right:4px">${map[c]}</span>`
    : c
  ).join('');
}

function formatHex(hex) {
  return hex.match(/.{1,2}/g)
    .map((b,i) => `<span>${b}</span>` + (i % 16 === 15 ? '\n' : ''))
    .join('');
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchTab(btn, showId) {
  const section = btn.closest('.detail-section');
  section.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  section.querySelectorAll('.payload-box, .hex-box').forEach(el => {
    el.style.display = el.id === showId ? '' : 'none';
  });
}

function showEmptyDetail() {
  document.getElementById('detail-id').textContent = '—';
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <path d="M2 12C2 12 5 5 12 5C19 5 22 12 22 12C22 12 19 19 12 19C5 19 2 12 2 12Z" stroke="#4a6680" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3" stroke="#4a6680" stroke-width="1.5"/>
      </svg>
      <span>SELECT A PACKET</span>
      <span style="font-size:9px;margin-top:-4px;">to inspect its contents</span>
    </div>`;
}

// ── UI helpers ────────────────────────────────────────────────────────
function updateBadge(running) {
  const badge = document.getElementById('status-badge');
  badge.className = running ? 'running' : '';
  document.getElementById('status-text').textContent = running ? 'CAPTURING' : 'IDLE';
}

function updateStats(s) {
  document.getElementById('stat-total').textContent = s.total;
  document.getElementById('stat-tcp').textContent   = s.tcp;
  document.getElementById('stat-udp').textContent   = s.udp;
  document.getElementById('stat-icmp').textContent  = s.icmp;
}

function setMsg(m) {
  document.getElementById('sb-msg').textContent = m;
}

// ── Boot ──────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
